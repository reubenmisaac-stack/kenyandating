<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenya Dating - Find Your Match</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Auth Pages -->
        <div id="auth-page" class="page">
            <div class="auth-container">
                <div class="auth-header">
                    <h1>💕 Kenya Dating</h1>
                    <p>Find Your Perfect Match</p>
                </div>

                <div class="auth-tabs">
                    <button id="tab-login" class="tab-button active" onclick="switchTab('login')">Login</button>
                    <button id="tab-register" class="tab-button" onclick="switchTab('register')">Register</button>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form active">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="auth-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="register-email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="register-password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="register-name" placeholder="Your Name" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Age</label>
                            <input type="number" id="register-age" placeholder="25" required>
                        </div>
                        <div class="form-group">
                            <label>Gender</label>
                            <select id="register-gender" required>
                                <option value="">Select</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="register-location" placeholder="Nairobi, Kenya" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
            </div>
        </div>

        <!-- Main App -->
        <div id="main-page" class="page" style="display: none;">
            <nav class="navbar">
                <div class="nav-container">
                    <h2>💕 Kenya Dating</h2>
                    <div class="nav-menu">
                        <button onclick="showHome()" class="nav-btn active-nav">Browse</button>
                        <button onclick="showMatches()" class="nav-btn">Matches</button>
                        <button onclick="showMessages()" class="nav-btn">Messages</button>
                        <button onclick="showProfile()" class="nav-btn">Profile</button>
                        <button onclick="logout()" class="nav-btn logout-btn">Logout</button>
                    </div>
                </div>
            </nav>

            <div class="content">
                <!-- Browse Profiles -->
                <div id="home-section" class="section active">
                    <h2>Discover Singles</h2>
                    <div id="profiles-container" class="profiles-grid">
                        <!-- Profiles loaded here -->
                    </div>
                </div>

                <!-- Matches -->
                <div id="matches-section" class="section">
                    <h2>Your Matches</h2>
                    <div id="matches-container" class="matches-list">
                        <!-- Matches loaded here -->
                    </div>
                </div>

                <!-- Messages -->
                <div id="messages-section" class="section">
                    <div class="messages-wrapper">
                        <div id="conversations-list" class="conversations-list">
                            <!-- Conversations loaded here -->
                        </div>
                        <div id="chat-box" class="chat-box" style="display: none;">
                            <div id="chat-messages" class="chat-messages">
                                <!-- Messages loaded here -->
                            </div>
                            <div class="chat-input-area">
                                <input type="text" id="message-input" placeholder="Type a message..." />
                                <button onclick="sendMessage()" class="btn btn-sm">Send</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Profile -->
                <div id="profile-section" class="section">
                    <h2>My Profile</h2>
                    <form id="profile-form" class="profile-form">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="profile-name" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Age</label>
                                <input type="number" id="profile-age" required>
                            </div>
                            <div class="form-group">
                                <label>Gender</label>
                                <select id="profile-gender" required>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" id="profile-location" required>
                        </div>
                        <div class="form-group">
                            <label>Bio</label>
                            <textarea id="profile-bio" placeholder="Tell us about yourself..." rows="4"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Interests (comma separated)</label>
                            <input type="text" id="profile-interests" placeholder="Travel, Music, Cooking">
                        </div>
                        <button type="submit" class="btn btn-primary">Save Profile</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
